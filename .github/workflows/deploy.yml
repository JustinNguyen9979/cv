name: Deploy CV to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Quyền hạn cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc chạy song song nhiều workflow deploy cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm ci

      - name: Build dự án
        run: npm run build

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
